<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大纲管理 - Novel Codex Studio</title>
  <link rel="stylesheet" href="/css/common.css">
  <style>
    .outline-layout { display: grid; grid-template-columns: 280px 1fr; gap: 20px; }
    .outline-nav { background: var(--panel); border: 1px solid var(--line-subtle); border-radius: 10px; padding: 16px; }
    .outline-nav h3 { font-size: 14px; margin-bottom: 12px; }
    .volume-list { display: flex; flex-direction: column; gap: 8px; }
    .volume-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; transition: all 0.15s ease; }
    .volume-item:hover { background: rgba(255,255,255,0.04); }
    .volume-item.active { background: rgba(52,135,255,0.08); color: var(--blue); }
    .volume-item strong { font-size: 13px; display: block; }
    .volume-item span { font-size: 11px; color: var(--text-tertiary); }
    .outline-editor { background: var(--panel); border: 1px solid var(--line-subtle); border-radius: 10px; padding: 20px; }
    .outline-editor h3 { font-size: 16px; margin-bottom: 16px; }
    .chapter-outline { display: flex; flex-direction: column; gap: 12px; }
    .chapter-outline-item { display: grid; grid-template-columns: 60px 1fr; gap: 12px; padding: 12px; background: var(--bg-elevated); border-radius: 8px; border: 1px solid var(--line-subtle); }
    .chapter-outline-item .num { font-size: 18px; font-weight: 700; color: var(--text-tertiary); }
    .chapter-outline-item .content { flex: 1; }
    .chapter-outline-item .content input { width: 100%; margin-bottom: 8px; background: transparent; border: none; border-bottom: 1px solid var(--line-subtle); padding: 4px 0; font-size: 14px; font-weight: 500; color: var(--text-primary); }
    .chapter-outline-item .content input:focus { border-color: var(--blue); }
    .chapter-outline-item .content textarea { width: 100%; min-height: 60px; background: transparent; border: 1px solid var(--line-subtle); border-radius: 6px; padding: 8px; font-size: 12px; color: var(--text-secondary); resize: vertical; }
    .action-bar { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--line-subtle); }
  </style>
</head>
<body>
  <div class="app-frame">
    <nav class="side-nav">
      <div class="nav-brand">◆</div>
      <a href="/" class="nav-item"><span class="icon">💡</span><span class="label">选题</span></a>
      <a href="/foundation.html" class="nav-item"><span class="icon">🏗</span><span class="label">框架</span></a>
      <a href="/outline.html" class="nav-item active"><span class="icon">📋</span><span class="label">大纲</span></a>
      <a href="/dashboard.html" class="nav-item"><span class="icon">📊</span><span class="label">指挥</span></a>
      <a href="/pipeline.html" class="nav-item"><span class="icon">⚙</span><span class="label">流水线</span></a>
      <a href="/issues.html" class="nav-item"><span class="icon">⚠</span><span class="label">问题</span></a>
      <a href="/export.html" class="nav-item"><span class="icon">📤</span><span class="label">导出</span></a>
      <div class="nav-spacer"></div>
      <a href="/settings.html" class="nav-item"><span class="icon">⚙</span><span class="label">设置</span></a>
    </nav>

    <div class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <span class="breadcrumb"><strong>大纲管理</strong> / 卷纲 · 章纲</span>
        </div>
      </header>

      <div class="page-content">
        <div class="page-header">
          <h1>大纲管理</h1>
          <p>编写卷纲和章纲，定义每章的契约和节点</p>
        </div>

        <div class="phase-bar" id="phase-bar">
          <div class="phase-step completed" data-phase="topic">选题</div>
          <div class="phase-step completed" data-phase="foundation">框架</div>
          <div class="phase-step active" data-phase="outline">大纲</div>
          <div class="phase-step" data-phase="production">正文</div>
          <div class="phase-step" data-phase="review">审查</div>
          <div class="phase-step" data-phase="export">发布</div>
        </div>

        <div class="outline-layout">
          <div class="outline-nav">
            <h3>卷列表</h3>
            <div class="volume-list">
              <div class="volume-item active">
                <strong>第一卷：零点</strong>
                <span>10 章</span>
              </div>
            </div>
          </div>
          <div class="outline-editor">
            <h3>第一卷 · 章纲</h3>
            <div class="chapter-outline" id="chapter-outline"></div>
          </div>
        </div>

        <div class="action-bar">
          <button class="btn btn-ghost" onclick="saveOutline()">💾 保存</button>
          <button class="btn btn-primary" onclick="completeOutline()">✓ 完成大纲，进入正文</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script>
    const { api, showToast } = window.NCS;

    const chapterOutlines = [
      { num: 1, title: '妹妹死后三年，我接到了她的求救电话', desc: 'OPN: 陈默接到异常电话。CBN: 建立悬念。Plot Point A: 陈曦已死三年。CEN: 陈默决定追查。CEQ: 电话那头是谁？' },
      { num: 2, title: '无法回拨', desc: 'OPN: 尝试回拨失败。CBN: 电话来源成谜。Plot Point A: 发现旧儿童手表。CEN: 手表背面有刻痕。CEQ: 刻痕是什么意思？' },
      { num: 3, title: '停机三年', desc: 'OPN: 查询号码状态。CBN: 号码已停机。Plot Point A: 苏岚出现，提供线索。CEN: 陈默与苏岚达成合作。CEQ: 静默计划是什么？' },
      { num: 4, title: '旧表背面', desc: 'OPN: 检查手表。CBN: 发现刻痕是妹妹名字。Plot Point A: 手表与妹妹有关。CEN: 陈默保留手表。CEQ: 为什么有妹妹的名字？' },
      { num: 5, title: '第5章', desc: '' },
      { num: 6, title: '第6章', desc: '' },
      { num: 7, title: '第7章', desc: '' },
      { num: 8, title: '第8章', desc: '' },
      { num: 9, title: '第9章', desc: '' },
      { num: 10, title: '第10章', desc: '' },
    ];

    function renderOutline() {
      const container = document.getElementById('chapter-outline');
      container.innerHTML = '';
      chapterOutlines.forEach(ch => {
        const div = document.createElement('div');
        div.className = 'chapter-outline-item';
        div.innerHTML = `
          <div class="num">${String(ch.num).padStart(2,'0')}</div>
          <div class="content">
            <input value="${ch.title}" placeholder="章节标题">
            <textarea placeholder="章节契约、节点、描述...">${ch.desc}</textarea>
          </div>
        `;
        container.appendChild(div);
      });
    }

    async function saveOutline() {
      const items = [];
      document.querySelectorAll('.chapter-outline-item').forEach(el => {
        const inputs = el.querySelectorAll('input, textarea');
        items.push({
          title: inputs[0].value,
          desc: inputs[1].value
        });
      });
      try {
        await api('POST', '/api/phase/outline', { data: { chapters: items } });
        showToast('已保存', 'success');
      } catch (e) {
        showToast('保存失败', 'error');
      }
    }

    async function completeOutline() {
      await saveOutline();
      try {
        await api('POST', '/api/phase/outline/complete');
        showToast('大纲完成，进入正文生产', 'success');
        setTimeout(() => window.location.href = '/dashboard.html', 1000);
      } catch (e) {
        showToast('推进失败', 'error');
      }
    }

    renderOutline();
  </script>
</body>
</html>
