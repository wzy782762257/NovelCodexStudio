<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全局设置 - Novel Codex Studio</title>
  <link rel="stylesheet" href="/css/common.css">
  <style>
    .settings-layout { display: grid; grid-template-columns: 240px 1fr; gap: 20px; }
    .settings-nav { display: flex; flex-direction: column; gap: 4px; }
    .settings-nav-item { padding: 10px 12px; border-radius: 6px; color: var(--text-secondary); font-size: 13px; cursor: pointer; transition: all 0.15s ease; }
    .settings-nav-item:hover { background: rgba(255,255,255,0.04); color: var(--text-primary); }
    .settings-nav-item.active { background: rgba(52,135,255,0.08); color: var(--blue); }
    .settings-panel { background: var(--panel); border: 1px solid var(--line-subtle); border-radius: 10px; padding: 24px; }
    .settings-panel h3 { font-size: 16px; margin-bottom: 20px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; max-width: 400px; }
    .form-group .hint { font-size: 12px; color: var(--text-tertiary); margin-top: 4px; }
    .form-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
  </style>
</head>
<body>
  <div class="app-frame">
    <nav class="side-nav">
      <div class="nav-brand">◆</div>
      <a href="/" class="nav-item"><span class="icon">💡</span><span class="label">选题</span></a>
      <a href="/foundation.html" class="nav-item"><span class="icon">🏗</span><span class="label">框架</span></a>
      <a href="/outline.html" class="nav-item"><span class="icon">📋</span><span class="label">大纲</span></a>
      <a href="/dashboard.html" class="nav-item"><span class="icon">📊</span><span class="label">指挥</span></a>
      <a href="/pipeline.html" class="nav-item"><span class="icon">⚙</span><span class="label">流水线</span></a>
      <a href="/issues.html" class="nav-item"><span class="icon">⚠</span><span class="label">问题</span></a>
      <a href="/export.html" class="nav-item"><span class="icon">📤</span><span class="label">导出</span></a>
      <div class="nav-spacer"></div>
      <a href="/settings.html" class="nav-item active"><span class="icon">⚙</span><span class="label">设置</span></a>
    </nav>

    <div class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <span class="breadcrumb"><strong>全局设置</strong> / 模型 · 引擎 · 质量</span>
        </div>
      </header>

      <div class="page-content">
        <div class="page-header">
          <h1>全局设置</h1>
          <p>配置模型参数、引擎行为、质量标准</p>
        </div>

        <div class="settings-layout">
          <div class="settings-nav">
            <div class="settings-nav-item active" data-panel="model">模型配置</div>
            <div class="settings-nav-item" data-panel="engine">引擎设置</div>
            <div class="settings-nav-item" data-panel="quality">质量标准</div>
            <div class="settings-nav-item" data-panel="platform">平台账号</div>
          </div>

          <div class="settings-panel">
            <div id="panel-model">
              <h3>模型配置</h3>
              <div class="form-group">
                <label>模型名称</label>
                <select id="model-name">
                  <option value="deepseek-ai/DeepSeek-V3">DeepSeek-V3 (SiliconFlow)</option>
                  <option value="deepseek-ai/DeepSeek-R1">DeepSeek-R1 (SiliconFlow)</option>
                  <option value="Qwen/Qwen2.5-72B-Instruct">Qwen2.5-72B (SiliconFlow)</option>
                </select>
              </div>
              <div class="form-group">
                <label>API Key</label>
                <input type="password" id="api-key" placeholder="sk-...">
                <div class="hint">你的 SiliconFlow API Key</div>
              </div>
              <div class="form-group">
                <label>最大 Token 数</label>
                <input type="number" id="max-tokens" value="6000">
              </div>
            </div>

            <div id="panel-engine" style="display:none;">
              <h3>引擎设置</h3>
              <div class="form-group">
                <label>默认运行模式</label>
                <select id="default-mode">
                  <option value="auto">全自动</option>
                  <option value="pause">暂停模式</option>
                  <option value="manual">手动模式</option>
                </select>
              </div>
              <div class="form-group">
                <label>批量生成章节数</label>
                <input type="number" id="batch-size" value="1" min="1" max="10">
              </div>
              <div class="form-group">
                <label>最大运行时间（分钟）</label>
                <input type="number" id="max-runtime" value="600">
              </div>
            </div>

            <div id="panel-quality" style="display:none;">
              <h3>质量标准</h3>
              <div class="form-group">
                <label>最低质量分数</label>
                <input type="number" id="quality-threshold" value="70" min="0" max="100">
                <div class="hint">低于此分数的章节需要修订</div>
              </div>
              <div class="form-group">
                <label>最大修订次数</label>
                <input type="number" id="max-revisions" value="3" min="1" max="10">
              </div>
            </div>

            <div id="panel-platform" style="display:none;">
              <h3>平台账号</h3>
              <div class="form-group">
                <label>番茄小说账号</label>
                <input type="text" placeholder="未绑定">
              </div>
              <div class="form-group">
                <label>起点中文网账号</label>
                <input type="text" placeholder="未绑定">
              </div>
            </div>

            <div class="action-bar" style="margin-top: 24px;">
              <button class="btn btn-primary" onclick="saveSettings()">💾 保存设置</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script>
    const { api, showToast } = window.NCS;

    document.querySelectorAll('.settings-nav-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.settings-nav-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        const panel = item.dataset.panel;
        document.querySelectorAll('[id^="panel-"]').forEach(el => el.style.display = 'none');
        document.getElementById(`panel-${panel}`).style.display = 'block';
      });
    });

    async function saveSettings() {
      const settings = {
        model: document.getElementById('model-name').value,
        max_tokens: parseInt(document.getElementById('max-tokens').value),
        batch_size: parseInt(document.getElementById('batch-size').value),
        quality_threshold: parseInt(document.getElementById('quality-threshold').value),
      };
      try {
        await api('POST', '/settings', settings);
        showToast('设置已保存', 'success');
      } catch (e) {
        showToast('保存失败', 'error');
      }
    }
  </script>
</body>
</html>
